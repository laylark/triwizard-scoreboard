<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triwizard Tournament Scoreboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <p class="eyebrow">Hogwarts House Standings</p>
        <h1>Triwizard Tournament Scoreboard</h1>
        <p class="intro">A magical tally of house points, presented in the Great Hall after dark.</p>
        <button type="button" class="reset-button" id="reset-scores">Clear Scores</button>
      </header>

      <section class="teams" aria-label="Team score sections">
        <article class="team team-gryffindor" data-team="gryffindor">
          <span class="team-badge">House</span>
          <h2>Gryffindor</h2>
          <p class="score-label">Score</p>
          <p class="score" aria-label="Gryffindor score"></p>
          <div class="controls" aria-label="Gryffindor score controls">
            <button type="button" class="score-button" data-points="1">+1</button>
            <button type="button" class="score-button" data-points="2">+2</button>
            <button type="button" class="score-button" data-points="3">+3</button>
            <button type="button" class="score-button" data-points="4">+4</button>
          </div>
        </article>

        <article class="team team-hufflepuff" data-team="hufflepuff">
          <span class="team-badge">House</span>
          <h2>Hufflepuff</h2>
          <p class="score-label">Score</p>
          <p class="score" aria-label="Hufflepuff score"></p>
          <div class="controls" aria-label="Hufflepuff score controls">
            <button type="button" class="score-button" data-points="1">+1</button>
            <button type="button" class="score-button" data-points="2">+2</button>
            <button type="button" class="score-button" data-points="3">+3</button>
            <button type="button" class="score-button" data-points="4">+4</button>
          </div>
        </article>

        <article class="team team-ravenclaw" data-team="ravenclaw">
          <span class="team-badge">House</span>
          <h2>Ravenclaw</h2>
          <p class="score-label">Score</p>
          <p class="score" aria-label="Ravenclaw score"></p>
          <div class="controls" aria-label="Ravenclaw score controls">
            <button type="button" class="score-button" data-points="1">+1</button>
            <button type="button" class="score-button" data-points="2">+2</button>
            <button type="button" class="score-button" data-points="3">+3</button>
            <button type="button" class="score-button" data-points="4">+4</button>
          </div>
        </article>

        <article class="team team-slytherin" data-team="slytherin">
          <span class="team-badge">House</span>
          <h2>Slytherin</h2>
          <p class="score-label">Score</p>
          <p class="score" aria-label="Slytherin score"></p>
          <div class="controls" aria-label="Slytherin score controls">
            <button type="button" class="score-button" data-points="1">+1</button>
            <button type="button" class="score-button" data-points="2">+2</button>
            <button type="button" class="score-button" data-points="3">+3</button>
            <button type="button" class="score-button" data-points="4">+4</button>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
